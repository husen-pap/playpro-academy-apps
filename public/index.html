<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Aplikasi Logistik Playpro Academy</title>
    <style>
        :root {
            --primary-color: #004B75;     /* Midnight Blue */
            --secondary-color: #002B49;   
            --accent-color: #1379B2;      
            --shape-bg: #e3eff5;          
            --white: #ffffff;
            --text-dark: #0f172a;         
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0;
            background-color: #f4f8fa;
            color: var(--text-dark);
        }

        .login-page { 
            background-color: var(--shape-bg) !important; 
            min-height: 100vh; 
            display: flex;
            flex-direction: column; 
        }

        .unj-login-header { 
            background-color: var(--primary-color) !important; 
            padding: 15px 40px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            border-bottom: 3px solid var(--white) !important; 
        }

        .unj-brand { display: flex; align-items: center; }
        .unj-logo { font-size: 1.8rem; margin-right: 15px; }
        .unj-brand-text { color: var(--white) !important; font-size: 1.2rem; font-weight: bold; letter-spacing: 0.5px; }

        .login-wrapper { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            flex-grow: 1;                 
            padding: 40px 20px;           
            box-sizing: border-box;
        }

        .login-card { 
            background: var(--white) !important; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 8px 25px rgba(0, 75, 117, 0.15) !important; 
            width: 100%; 
            max-width: 420px; 
            border: 1px solid #cbdff0 !important; 
            box-sizing: border-box;
        }

        .login-card h2 { text-align: center; color: var(--primary-color) !important; margin: 0 0 10px 0; font-weight: 700; }
        .login-subtitle { text-align: center; color: #5c708a; font-size: 0.9rem; margin-bottom: 30px; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--primary-color); }
        .form-group input { 
            width: 100%; 
            padding: 13px;                
            border: 1px solid #cbdff0; 
            border-radius: 6px; 
            box-sizing: border-box; 
            font-size: 0.95rem;
        }
        .form-group input:focus { outline: none; border-color: var(--primary-color); }

        .btn-login { 
            background-color: var(--accent-color) !important; 
            color: var(--white) !important; 
            border: none; padding: 14px; 
            border-radius: 6px; font-weight: bold; 
            width: 100%; cursor: pointer; 
            margin-top: 15px; font-size: 1rem;
            transition: background 0.2s; 
        }
        .btn-login:hover { background-color: var(--secondary-color) !important; }
    </style>
</head>
<body class="login-page">

    <div class="unj-login-header">
        <div class="unj-brand">
            <span class="unj-logo">🏀</span>
            <span class="unj-brand-text">APLIKASI LOGISTIK PLAYPRO ACADEMY</span>
        </div>
    </div>

    <div class="login-wrapper">
        <div class="login-card">
            <h2>LOGIN</h2>
            <p class="login-subtitle">Silakan masukkan Username dan Password Anda</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label>Username Pengguna</label>
                    <input type="text" id="username" placeholder="Masukkan Username Anda" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Masukkan Password Anda" required>
                </div>
                <button type="submit" class="btn-login">Login</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const result = await res.json();

                if (result.success) {
                    // 💡 SINKRONISASI PAYLOAD ASLI: Menyimpan data flat milik backend lu le!
                    localStorage.setItem('user', JSON.stringify({
                        username: result.username,
                        role: result.role,
                        cabang: result.cabang
                    }));
                    window.location.href = 'dashboard.html';
                } else {
                    alert(result.message || 'Username atau Password salah le!');
                }
            } catch (err) {
                alert('Server backend lu mati atau eror bre!');
            }
        });
    </script>
</body>
</html>
